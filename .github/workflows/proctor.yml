name: PRoctor

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  proctor:
    if: github.event_name != 'issue_comment' || contains(github.event.comment.body, '/proctor run')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      # Go module + build cache (default in setup-go@v5).
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      # pnpm content-addressable store cache for the Vite frontend.
      - uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - uses: zealllot/proctor/github-action@v0.1.15
        with:
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
